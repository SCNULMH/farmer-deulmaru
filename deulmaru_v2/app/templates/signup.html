<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>들마루 v2 회원가입</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/dashboard.css') }}">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-copy">
      <a class="brand" href="/login">
        <span class="brand-mark">DM</span>
        <span>
          <strong>들마루 v2</strong>
          <small>청년농 맞춤형 공공데이터 대시보드</small>
        </span>
      </a>
      <h1>기본 농장 정보를 저장하고 개인화 대시보드를 시작하세요.</h1>
      <p class="lead">
        회원 정보는 현재 설정된 DB 백엔드에 저장됩니다. 로컬은 SQLite, 운영 배포는 Firestore를 사용합니다.
      </p>
      <ul class="login-points">
        <li>Firestore 저장</li>
        <li>개인화 추천</li>
        <li>공공데이터 연동</li>
      </ul>
    </section>

    <section class="login-card">
      <p class="eyebrow">Signup</p>
      <h2>회원가입</h2>
      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/signup">
        <label>
          아이디
          <input type="text" name="user_id" autocomplete="username" placeholder="youngfarmer01" required>
        </label>
        <label>
          비밀번호
          <input type="password" name="password" autocomplete="new-password" minlength="8" required>
        </label>
        <label>
          이름
          <input type="text" name="name" placeholder="홍길동" required>
        </label>
        <label>
          지역
          <input type="text" name="region" placeholder="전남 나주" required>
        </label>
        <label>
          주요 작물
          <input type="text" name="crop" placeholder="토마토" required>
        </label>
        <button type="submit">가입하고 시작하기</button>
      </form>
      <p class="demo-hint">이미 계정이 있나요? <a href="/login">로그인</a></p>
    </section>
  </main>
</body>
</html>
