<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>들마루 v2 로그인</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-copy">
      <a class="brand" href="/login">
        <span class="brand-mark">DM</span>
        <span>
          <strong>들마루 v2</strong>
          <small>청년농 맞춤형 공공데이터 대시보드</small>
        </span>
      </a>
      <h1>내 농장 조건에 맞는 지원사업과 작물 정보를 한곳에서 봅니다.</h1>
      <p class="lead">
        지역, 작물, 성장 단계에 맞춰 지원사업, 재배 일정, 병해충 가이드를 확인하세요.
        이미 계정이 있다면 로그인하고, 처음이라면 바로 가입할 수 있습니다.
      </p>
      <ul class="login-points">
        <li>지원사업 추천</li>
        <li>작물 일정 관리</li>
        <li>AI 병해 진단</li>
      </ul>
    </section>

    <section class="login-card">
      <p class="eyebrow">Login</p>
      <h2>로그인</h2>
      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label>
          아이디
          <input type="text" name="user_id" value="demo" autocomplete="username" required>
        </label>
        <label>
          비밀번호
          <input type="password" name="password" value="demo1234" autocomplete="current-password" required>
        </label>
        <button type="submit">로그인</button>
      </form>
      <p class="demo-hint">데모 계정: <strong>demo / demo1234</strong></p>
      <p class="demo-hint">처음 오셨나요? <a href="/signup">회원가입</a></p>
    </section>
  </main>
</body>
</html>
