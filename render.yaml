services:
  - type: web
    runtime: python
    name: deulmaru-v2
    repo: https://github.com/SCNULMH/farmer-deulmaru
    branch: main
    rootDir: deulmaru_v2
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - deulmaru_v2/**
        - render.yaml
      ignoredPaths:
        - src/**
        - "*.md"
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_BACKEND
        value: "firebase"
      - key: USE_DEMO_DATA
        value: "false"
      - key: SUPPORT_API_BASE_URL
        value: "http://apis.data.go.kr/1390000/youngV2"
      - key: SUPPORT_API_SERVICE_KEY
        sync: false
      - key: NCPMS_API_BASE_URL
        value: "http://ncpms.rda.go.kr/npmsAPI/service"
      - key: NCPMS_API_KEY
        sync: false
      - key: NONGSARO_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
